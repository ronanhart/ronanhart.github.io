    - label : "Email"
      icon  : "fa fa-envelope"
      url   : "mailto:ronanhart92@gmail.com"
      

defaults:
  # _posts
  - scope:
      path            : ""
      type            : posts
    values:
      layout          : single
      author_profile  : true
      read_time       : true
      comments        : true
      share           : true
      related         : true
  # _pages
  - scope:
      path            : "_pages"
      type            : pages
    values            :
      layout          : single
      author_profile  : true

category_archive:
  type            : liquid
  path            : /categories/
tag_archive:
  type            : liquid
  path            : /tags/

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

